{% extends 'blog/base.html' %}

{% block content %}

<h2>Delete Blog</h2>

<p>
Are you sure you want to delete
<strong>{{ post.title }}</strong>?
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<br>

<a href="{% url 'post_detail' post.id %}">
    Cancel
</a>

{% endblock %}
